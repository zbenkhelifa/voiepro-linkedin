name: Post LinkedIn VoiePro

on:
  schedule:
    - cron: '0 8 * * 1,3,5' # Lun/Mer/Ven à 8h UTC (10h Paris)
  workflow_dispatch:
    inputs:
      theme:
        description: 'Thème personnalisé (optionnel — laisse vide pour le thème du jour)'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm install

      - name: Récupérer les tendances Google News
        run: node scripts/fetch_trends.js
        continue-on-error: true

      - name: Générer le post avec Mistral AI
        run: node scripts/generate_post.js
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CUSTOM_THEME: ${{ inputs.theme }}

      - name: Valider le post
        run: node scripts/validate_post.js

      - name: Publier sur LinkedIn
        run: node post-linkedin.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
