name: Post LinkedIn VoiePro

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Thème personnalisé (optionnel)'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Récupérer les tendances Google News
        run: node scripts/fetch_trends.js
        continue-on-error: true

      - name: Générer le post avec Mistral AI
        run: node scripts/generate_post.js
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CUSTOM_THEME: ${{ inputs.theme || '' }}

      - name: Valider le post
        run: node scripts/validate_post.js

      - name: Publier sur LinkedIn
        run: node post-linkedin.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
